# Production RAG SOW Extractor: Vertex AI (Gemini) + SharePoint + Smart Resume
# Build requires a root `.env` (Dockerfile COPY .env). Compose can still override env and mount the GCP key.
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # GCP / Vertex AI (project from service account JSON if GCP_PROJECT not set)
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-key.json
      - GCP_LOCATION=${GCP_LOCATION:-us-central1}
      - VERTEX_MODEL=${VERTEX_MODEL:-gemini-2.5-flash}
      - VERTEX_EMBEDDING_MODEL=${VERTEX_EMBEDDING_MODEL:-text-embedding-004}
      # SharePoint (required for /extract-sow)
      - SHAREPOINT_CLIENT_ID=${SHAREPOINT_CLIENT_ID}
      - SHAREPOINT_CLIENT_SECRET=${SHAREPOINT_CLIENT_SECRET}
      - SHAREPOINT_TENANT_ID=${SHAREPOINT_TENANT_ID}
      - SHAREPOINT_SITE_URL=${SHAREPOINT_SITE_URL}
      - SHAREPOINT_DRIVE_ID=${SHAREPOINT_DRIVE_ID:-}
      - SHAREPOINT_DRIVE_PATH=${SHAREPOINT_DRIVE_PATH:-}
      # Optional: GCS bucket for Excel + PDF uploads; leave unset to skip GCS
      - GCS_OUTPUT_BUCKET=${GCS_OUTPUT_BUCKET:-}
      - GCS_PDF_STORAGE_PREFIX=${GCS_PDF_STORAGE_PREFIX:-pdfs}
      # Optional: run extraction every N min when idle (0 = disabled)
      - EXTRACTION_MONITOR_INTERVAL_MINUTES=${EXTRACTION_MONITOR_INTERVAL_MINUTES:-0}
      # App
      - DATA_DIR=/app/data
    volumes:
      # Persistent state and Excel output
      - rag-data:/app/data
      # Mount GCP service account JSON (path must match GOOGLE_APPLICATION_CREDENTIALS)
      - ${GCP_CREDENTIALS_PATH:-./secrets/gcp-key.json}:/app/secrets/gcp-key.json:ro
    restart: unless-stopped

volumes:
  rag-data:
